  <main class="blog-detail-main">

        <div class="blog-detail-content">
          <div class="blog-detail-figure">
            <div class="blog-detail-figure__img"><img id="bd-image" src="" alt="" /></div>
            <div class="blog-detail-titleblock">
              <div class="blog-detail-meta">
                <span id="bd-date"></span>
                <span class="blog-detail-meta__divider">|</span>
                <span id="bd-category"></span>
              </div>
              <h1 class="blog-detail-title" id="bd-title"></h1>
            </div>
          </div>
          <div class="blog-detail-body">
            <p class="description" id="bd-description"></p>
          </div>
        </div>

        <aside class="blog-sidebar">
          <form class="blog-search" id="blogSearchForm">
            <input type="text" placeholder="Search..." id="blogSearchInput" />
            <div class="blog-search__right">
              <div class="blog-search__sep"></div>
              <button type="submit"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
            </div>
          </form>
          <div class="blog-about">
            <h3 class="blog-side-title">About Us</h3>
            <div class="blog-side-rule"></div>
            <p>We are ....</p>
          </div>
          <div class="blog-latest">
            <h3 class="blog-side-title">Latest Posts</h3>
            <div class="blog-side-rule"></div>
            <div class="blog-latest__list" id="blogLatest"></div>
          </div>
        </aside>
      </div>
    </div>
